name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run lint, typecheck, test, and build
        run: yarn nx run-many -t lint tsc-check test build
